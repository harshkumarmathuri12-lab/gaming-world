<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="robots" content="index, follow">

    <!-- 🔥 CANONICAL -->
    <link rel="canonical" href="https://gameshubx.com/">

    <!-- 🔥 FAVICON (IMPORTANT FOR BRAND) -->

    <!-- 🔥 OPEN GRAPH -->
    <meta property="og:title" content="GamesHubX - Free Online Games">
    <meta property="og:description" content="Play games instantly without download.">
    <meta property="og:image" content="https://gameshubx.com/logo.png">
    <meta property="og:url" content="https://gameshubx.com/">
    <meta property="og:type" content="website">

    <!-- 🔥 STRUCTURED DATA -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GamesHubX",
      "url": "https://gameshubx.com/"
    }
    </script>

    <link rel="stylesheet" href="home.css">

    <!-- 🔥 GOOGLE ANALYTICS -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-00MX0SDY01"></script>
    <script>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="GamesHubX Logo" class="logo-img">
        <span class="logo-text">GamesHubX</span>
    </div>

    <nav>
        <a href="#home">Home</a>
        <a href="#featured">Games</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home" class="hero">
    <h1>GamesHubX</h1>
    <p>Play Free Online Games Instantly</p>
</section>

<section id="featured" class="games-section">
    <h2>Popular Games</h2>

    <div class="game-list">

        <div class="game" onclick="openGame('SnakeGame.html')">
            <img src="OIP.jpg" alt="Play Snake Game Online">
            <h3>Snake Game</h3>
        </div>

        <div class="game" onclick="openGame('sudoku.html')">
            <img src="sudoku.jpg" alt="Play Sudoku Online">
            <h3>Sudoku</h3>
        </div>

        <div class="game" onclick="openGame('chess.html')">
            <img src="chess.png" alt="Play Chess Online">
            <h3>Chess</h3>
        </div>

        <!-- baki same rehne de -->
        
    </div>
</section>

<div id="game-container">
    <div class="game-box">
        <button onclick="closeGame()" class="close-btn">X</button>

        <iframe 
            id="game-frame" 
            allowfullscreen 
            allow="autoplay; fullscreen; gamepad; keyboard">
        </iframe>
    </div>
</div>

<section id="contact">
    <h2>Contact GamesHubX</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 GamesHubX</p>
</footer>

<script src="home.js"></script>

</body>
</html>
