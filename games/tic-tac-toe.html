<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tic-Tac-Toe Online Free | GamesHubX</title>
    <meta name="description" content="Play Tic-Tac-Toe online for free with a simple two-player browser board on GamesHubX.">
    <link rel="stylesheet" href="../assets/css/tic-tac-toe.css">
    <link rel="stylesheet" href="../assets/css/game-pages.css">
</head>
<body>
<a class="back-home" href="../index.html">Back to Home</a>
<div class="game-container">
        <h1>Tic-Tac-Toe</h1>
        <div class="game-board" id="gameBoard">
            <div class="row">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
            </div>
            <div class="row">
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
            </div>
            <div class="row">
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
        </div>
        <button id="resetBtn">Restart Game</button>
        <p id="status">Player X's Turn</p>
    </div>

    <script src="../assets/js/tic-tac-toe.js"></script>
</body>
</html>
