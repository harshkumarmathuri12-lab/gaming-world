<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Player Pong Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f9;
        }
        h1 {
            margin-top: 20px;
        }
        canvas {
            border: 2px solid #000;
            margin-top: 20px;
            background-color: #000;
        }
        #status {
            font-size: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Two-Player Pong Game</h1>
    <canvas id="pongCanvas" width="800" height="400"></canvas>
    <div id="status"></div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");

        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;
        const canvasWidth = canvas.width;
        const canvasHeight = canvas.height;

        let paddle1Y = (canvasHeight - paddleHeight) / 2;
        let paddle2Y = (canvasHeight - paddleHeight) / 2;
        let ballX = canvasWidth / 2;
        let ballY = canvasHeight / 2;
        let ballSpeedX = 5;
        let ballSpeedY = 3;
        let paddle1Speed = 0;
        let paddle2Speed = 0;
        let score1 = 0;
        let score2 = 0;
        let gameOver = false;

        // Draw paddles and ball
        function draw() {
            if (gameOver) return;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw paddles
            ctx.fillStyle = "green";
            ctx.fillRect(0, paddle1Y, paddleWidth, paddleHeight);  // Player 1 paddle
            ctx.fillStyle = "blue";
            ctx.fillRect(canvasWidth - paddleWidth, paddle2Y, paddleWidth, paddleHeight);  // Player 2 paddle

            // Draw ball
            ctx.fillStyle = "red";
            ctx.fillRect(ballX, ballY, ballSize, ballSize);

            // Move paddles
            paddle1Y += paddle1Speed;
            paddle2Y += paddle2Speed;

            // Ball movement
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Ball collision with top and bottom walls
            if (ballY <= 0 || ballY + ballSize >= canvasHeight) {
                ballSpeedY = -ballSpeedY;
            }

            // Ball collision with paddles
            if (ballX <= paddleWidth && ballY >= paddle1Y && ballY <= paddle1Y + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                score1++;
            }
            if (ballX + ballSize >= canvasWidth - paddleWidth && ballY >= paddle2Y && ballY <= paddle2Y + paddleHeight) {
                ballSpeedX = -ballSpeedX;
                score2++;
            }

            // Ball out of bounds
            if (ballX <= 0 || ballX + ballSize >= canvasWidth) {
                if (ballX <= 0) score2++;
                if (ballX + ballSize >= canvasWidth) score1++;
                resetBall();
            }

            // Update score
            document.getElementById("status").textContent = `Player 1: ${score1} | Player 2: ${score2}`;

            // Check for game over
            if (score1 >= 10 || score2 >= 10) {
                gameOver = true;
                document.getElementById("status").textContent = score1 >= 10 ? "Player 1 Wins!" : "Player 2 Wins!";
            }
        }

        // Reset ball to center
        function resetBall() {
            ballX = canvasWidth / 2;
            ballY = canvasHeight / 2;
            ballSpeedX = -ballSpeedX;
            ballSpeedY = (Math.random() > 0.5 ? 1 : -1) * 3;
        }

        // Keydown controls
        window.addEventListener("keydown", (e) => {
            if (e.key === "w" && paddle1Y > 0) paddle1Speed = -10; // Player 1 up
            if (e.key === "s" && paddle1Y + paddleHeight < canvasHeight) paddle1Speed = 10; // Player 1 down

            if (e.key === "ArrowUp" && paddle2Y > 0) paddle2Speed = -10; // Player 2 up
            if (e.key === "ArrowDown" && paddle2Y + paddleHeight < canvasHeight) paddle2Speed = 10; // Player 2 down
        });

        // Keyup controls
        window.addEventListener("keyup", (e) => {
            if (e.key === "w" || e.key === "s") paddle1Speed = 0; // Stop Player 1
            if (e.key === "ArrowUp" || e.key === "ArrowDown") paddle2Speed = 0; // Stop Player 2
        });

        // Start the game loop
        setInterval(draw, 1000 / 60); // 60 FPS
    </script>
</body>
</html>
